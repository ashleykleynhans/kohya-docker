name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker-bake.hcl'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.extract.outputs.release }}
      app: ${{ steps.extract.outputs.app }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Extract RELEASE from docker-bake.hcl
        id: extract
        run: |
          RELEASE=$(grep 'variable "RELEASE"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          APP=$(grep 'variable "APP"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          REGISTRY_USER=$(grep 'variable "REGISTRY_USER"' -A 2 docker-bake.hcl | grep 'default' | sed 's/.*"\(.*\)"/\1/')

          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "app=${APP}" >> $GITHUB_OUTPUT
          echo "registry_user=${REGISTRY_USER}" >> $GITHUB_OUTPUT

          echo "Current RELEASE: ${RELEASE}"
          echo "Current APP: ${APP}"
          echo "Current REGISTRY_USER: ${REGISTRY_USER}"

      - name: Check if RELEASE changed
        id: check
        run: |
          # For manual triggers, always build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - will build"
            exit 0
          fi

          # Get the diff with context to see which variable blocks changed
          git diff -U3 HEAD^ HEAD docker-bake.hcl > /tmp/diff.txt

          # Display the diff for debugging
          echo "=== Diff of docker-bake.hcl ==="
          cat /tmp/diff.txt
          echo "================================"

          # Extract the current and previous values
          PREV_RELEASE=$(git show HEAD^:docker-bake.hcl | grep -A 2 'variable "RELEASE"' | grep 'default' | sed 's/.*"\(.*\)"/\1/')
          CURR_RELEASE="${{ steps.extract.outputs.release }}"

          echo "Previous RELEASE: '${PREV_RELEASE}'"
          echo "Current RELEASE: '${CURR_RELEASE}'"

          if [ "${PREV_RELEASE}" != "${CURR_RELEASE}" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "RELEASE changed - will build"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No RELEASE changes detected - skipping build"
          fi

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      images: ${{ steps.list-images.outputs.images }}
      images_json: ${{ steps.list-images.outputs.images_json }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Free up disk space
        run: |
          sudo swapoff -a
          sudo rm -rf /swapfile /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt clean
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temporary docker-bake override file
        run: |
          # Create an override file that forces ghcr.io
          cat > docker-bake.override.hcl << 'EOF'
          target "default" {
            inherits = ["default"]
            tags = [
              "ghcr.io/${{ github.repository_owner }}/${{ needs.detect-changes.outputs.app }}:${{ needs.detect-changes.outputs.release }}",
              "ghcr.io/${{ github.repository_owner }}/${{ needs.detect-changes.outputs.app }}:latest"
            ]
            attest = [
              "type=provenance,mode=max",
              "type=sbom"
            ]
          }
          EOF

          echo "Override file created:"
          cat docker-bake.override.hcl

      - name: Build and push all images (serially)
        env:
          REGISTRY: ghcr.io
          REGISTRY_USER: ${{ github.repository_owner }}
        run: |
          # Build images one at a time to avoid resource exhaustion

          echo "Building cu124-py311..."
          docker buildx bake -f docker-bake.hcl -f docker-bake.override.hcl --push cu124-py311
          docker buildx prune -af
          df -h

          echo "Building cu128-py311..."
          docker buildx bake -f docker-bake.hcl -f docker-bake.override.hcl --push cu128-py311
          docker buildx prune -af
          df -h

          echo "All images built successfully!"

      - name: Verify images were pushed
        run: |
          RELEASE="${{ needs.detect-changes.outputs.release }}"
          REGISTRY="ghcr.io"
          REGISTRY_USER="${{ github.repository_owner }}"
          APP="${{ needs.detect-changes.outputs.app }}"

          # Wait for registry to update
          sleep 10

          VARIANTS=("cu124-py311" "cu128-py311")
          for VARIANT in "${VARIANTS[@]}"; do
            IMAGE="${REGISTRY}/${REGISTRY_USER}/${APP}:${VARIANT}-${RELEASE}"
            echo "Verifying image: $IMAGE"
            docker buildx imagetools inspect "$IMAGE" || { echo "FAILED: Could not verify image: $IMAGE"; exit 1; }
            echo "SUCCESS: Image verified: $IMAGE"
          done

      - name: List built images
        id: list-images
        run: |
          RELEASE="${{ needs.detect-changes.outputs.release }}"
          REGISTRY="ghcr.io"
          REGISTRY_USER="${{ github.repository_owner }}"
          APP="${{ needs.detect-changes.outputs.app }}"

          # Create array of images
          IMAGES=(
            "${REGISTRY}/${REGISTRY_USER}/${APP}:cu124-py311-${RELEASE}"
            "${REGISTRY}/${REGISTRY_USER}/${APP}:cu128-py311-${RELEASE}"
          )

          # Create newline-separated list
          IMAGES_LIST=$(printf '%s\n' "${IMAGES[@]}")

          # Create JSON array for easier parsing by third-party tools
          IMAGES_JSON=$(printf '%s\n' "${IMAGES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          # Output for GitHub Actions
          echo "images<<EOF" >> $GITHUB_OUTPUT
          echo "$IMAGES_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "images_json=${IMAGES_JSON}" >> $GITHUB_OUTPUT

          # Also write to a file that can be downloaded
          echo "$IMAGES_LIST" > built-images.txt
          echo "$IMAGES_JSON" > built-images.json

      - name: Upload image list artifacts
        uses: actions/upload-artifact@v7
        with:
          name: docker-images-list
          path: |
            built-images.txt
            built-images.json
          retention-days: 90

      - name: Display built images
        run: |
          echo "Successfully built and pushed the following images:"
          cat built-images.txt
          echo ""
          echo "JSON format:"
          cat built-images.json

  create-summary:
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create job summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ needs.detect-changes.outputs.release }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Pushed to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.build-and-push.outputs.images }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JSON Format (for APIs):" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.build-and-push.outputs.images_json }}' | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Download the image list from the artifacts section above." >> $GITHUB_STEP_SUMMARY
